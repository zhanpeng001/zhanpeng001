name: Update Contribution Calendar

on:
  workflow_dispatch:
  schedule:
    - cron: '17 0 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Generate 2026 contribution calendar
        run: node scripts/generate-contribution-calendar.mjs
        env:
          GITHUB_USERNAME: zhanpeng001
          CONTRIBUTION_YEAR: 2026
          OUTPUT: assets/github-contributions-2026.svg

      - name: Commit updated calendar
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Update 2026 contribution calendar
          file_pattern: assets/github-contributions-2026.svg
